[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = ["npm install", "python3 -m pip install -r backend_python/requirements.txt --break-system-packages"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend_python && python3 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8001}"
